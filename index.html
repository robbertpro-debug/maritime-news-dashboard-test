<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Multraship Board Dashboard</title>
    <style>
      :root {
        --bg: #edf1f3;
        --surface: #ffffff;
        --surface-muted: #f4f7f8;
        --text: #132127;
        --text-soft: #607680;
        --line: #d7e0e4;
        --accent: #0f5966;
        --accent-soft: #dcecef;
        --multraship: #9c4c1b;
        --novatug: #0a6d5b;
        --both: #355c99;
        --critical: #8a1f2c;
        --high: #a45b08;
        --medium: #0e5f86;
        --low: #5d6a72;
        --danger: #9b2b2b;
        --shadow: 0 14px 34px rgba(20, 33, 39, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top right, rgba(15, 89, 102, 0.09), transparent 28%),
          linear-gradient(180deg, #f7f9fb 0%, var(--bg) 100%);
      }

      a {
        color: inherit;
      }

      .top-bar {
        position: sticky;
        top: 0;
        z-index: 100;
        background: var(--surface);
        border-bottom: 1px solid var(--line);
        box-shadow: 0 2px 8px rgba(20,33,39,0.06);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 0 28px;
        height: 56px;
      }

      .top-bar-brand {
        font-weight: 700;
        font-size: 15px;
        white-space: nowrap;
        display: flex;
        align-items: center;
        gap: 8px;
        flex-shrink: 0;
      }

      .top-bar-brand-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--accent);
        flex-shrink: 0;
      }

      .top-bar-right {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
      }

      .top-bar-stats {
        font-size: 12px;
        color: var(--text-soft);
        white-space: nowrap;
        padding-right: 10px;
        border-right: 1px solid var(--line);
      }

      .top-bar-toggle {
        display: flex;
        gap: 4px;
        flex-shrink: 0;
      }

      .top-bar-toggle + .top-bar-toggle {
        padding-left: 10px;
        border-left: 1px solid var(--line);
      }

      .top-bar-toggle .toggle-button {
        padding: 5px 12px;
        border-radius: 8px;
        font-size: 10px;
      }

      .refresh-icon-btn {
        width: 30px;
        height: 30px;
        padding: 0;
        border-radius: 8px;
        border: 1px solid var(--line);
        background: var(--surface-muted);
        color: var(--text-soft);
        cursor: pointer;
        font-size: 15px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        margin-left: 4px;
      }

      .refresh-icon-btn[disabled] {
        opacity: 0.5;
        cursor: progress;
      }

      .page {
        max-width: 1480px;
        margin: 0 auto;
        padding: 20px 20px 40px;
      }

      .card,
      .controls,
      .status-card,
      .summary-card,
      .bucket {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 18px;
        box-shadow: var(--shadow);
      }

      .card {
        padding: 22px 24px;
      }

      .eyebrow,
      .source-pill,
      .priority-pill,
      .tag,
      .toggle-button,
      .count-pill {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .eyebrow {
        gap: 8px;
        padding: 6px 12px;
        background: var(--accent-soft);
        color: var(--accent);
      }

      h1 {
        margin: 14px 0 10px;
        font-size: clamp(28px, 4vw, 42px);
        line-height: 1.05;
      }

      .hero-copy {
        margin: 0;
        color: var(--text-soft);
        max-width: 68ch;
        line-height: 1.5;
      }

      .status-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
        margin-top: 20px;
      }

      .status-card,
      .summary-card {
        padding: 14px 16px;
      }

      .status-label,
      .summary-label {
        display: block;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--text-soft);
      }

      .status-value,
      .summary-value {
        display: block;
        margin-top: 8px;
        font-size: 24px;
        font-weight: 700;
      }

      .summary-copy {
        display: block;
        margin-top: 6px;
        color: var(--text-soft);
        font-size: 13px;
      }

      .meta-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 12px;
        color: var(--text-soft);
        font-size: 14px;
      }

      .controls {
        padding: 18px;
      }

      .controls-panel {
        margin-bottom: 18px;
      }

      .controls-head {
        display: flex;
        flex-wrap: wrap;
        align-items: baseline;
        justify-content: space-between;
        gap: 10px 16px;
        margin-bottom: 14px;
      }

      .controls h2 {
        margin: 0;
        font-size: 16px;
      }

      .controls-copy {
        color: var(--text-soft);
        font-size: 14px;
      }

      .control-grid {
        display: grid;
        gap: 12px;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        align-items: end;
      }

      .primary-control-grid {
        display: grid;
        gap: 12px;
        grid-template-columns: minmax(280px, 2fr) minmax(210px, 1fr) auto auto;
        align-items: end;
      }

      .secondary-control-grid {
        margin-top: 12px;
      }

      .field-wide {
        grid-column: span 2;
      }

      .field {
        display: grid;
        gap: 6px;
      }

      .field label {
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--text-soft);
      }

      select,
      input[type="search"] {
        width: 100%;
        padding: 11px 12px;
        border-radius: 12px;
        border: 1px solid var(--line);
        background: var(--surface-muted);
        color: var(--text);
      }

      .checkbox-row {
        display: flex;
        align-items: center;
        gap: 10px;
        padding-top: 4px;
        color: var(--text-soft);
        font-size: 14px;
      }

      .clear-filter-button {
        padding: 11px 12px;
        border-radius: 12px;
        border: 1px solid var(--line);
        background: var(--surface-muted);
        color: var(--text);
        font-weight: 700;
        cursor: pointer;
      }

      .more-filters {
        margin-top: 14px;
        padding-top: 12px;
        border-top: 1px solid var(--line);
      }

      .more-filters summary {
        cursor: pointer;
        color: var(--text-soft);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .column-toggle-row {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px;
        margin-top: 14px;
        padding-top: 14px;
        border-top: 1px solid var(--line);
      }

      .column-toggle-label {
        color: var(--text-soft);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .column-toggle-button {
        padding: 7px 11px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: var(--surface);
        color: var(--text-soft);
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
      }

      .column-toggle-button.active[data-column="suppliers"] {
        background: #92400e;
        border-color: #92400e;
        color: #fff;
      }

      .column-toggle-button.active[data-column="clients"] {
        background: #1e40af;
        border-color: #1e40af;
        color: #fff;
      }

      .column-toggle-button.active[data-column="competitors"] {
        background: #991b1b;
        border-color: #991b1b;
        color: #fff;
      }

      .error-box {
        margin: 0 0 18px;
        padding: 14px 16px;
        border: 1px solid rgba(155, 43, 43, 0.2);
        background: rgba(155, 43, 43, 0.08);
        color: var(--danger);
        border-radius: 14px;
      }

      .action-button {
        padding: 10px 14px;
        border-radius: 12px;
        border: 1px solid var(--accent);
        background: var(--accent);
        color: #fff;
        font-weight: 700;
        cursor: pointer;
      }

      .action-button[disabled] {
        opacity: 0.6;
        cursor: progress;
      }

      .refresh-status {
        color: var(--text-soft);
        font-size: 13px;
      }

      .toggle-panel {
        display: grid;
        gap: 16px;
        margin-bottom: 18px;
      }

      .toggle-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .toggle-button {
        justify-content: center;
        padding: 11px 16px;
        border: 1px solid var(--line);
        background: var(--surface);
        color: var(--text-soft);
        cursor: pointer;
      }

      .toggle-button.active {
        color: #fff;
      }

      .toggle-button[data-audience="Multraship"].active {
        background: var(--multraship);
        border-color: var(--multraship);
      }

      .toggle-button[data-audience="Novatug"].active {
        background: var(--novatug);
        border-color: var(--novatug);
      }

      .toggle-button[data-audience="Both"].active {
        background: var(--both);
        border-color: var(--both);
      }

      .overview {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
        padding: 18px 20px;
      }

      .overview h2 {
        margin: 0 0 6px;
        font-size: 26px;
      }

      .overview p {
        margin: 0;
        color: var(--text-soft);
      }

      .overview-stats {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .count-pill {
        padding: 7px 10px;
        background: var(--surface-muted);
        color: var(--text-soft);
      }

      .summary-strip {
        display: grid;
        gap: 12px;
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .buckets {
        display: grid;
        gap: 16px;
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .bucket {
        overflow: hidden;
      }

      .bucket-head {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
        padding: 16px 18px;
        border-bottom: 1px solid var(--line);
        background: linear-gradient(180deg, #fff 0%, #f8fafb 100%);
      }

      .bucket[data-bucket="High Priority"] .bucket-head {
        background: linear-gradient(180deg, #fff7f8 0%, #fff2e9 100%);
      }

      .bucket[data-bucket="Port Watch"] .bucket-head {
        background: linear-gradient(180deg, #f6fbfc 0%, #edf5f7 100%);
      }

      .bucket[data-bucket="Clients & Projects"] .bucket-head {
        background: linear-gradient(180deg, #f6f8ff 0%, #edf2ff 100%);
      }

      .bucket[data-bucket="Competitors & Market"] .bucket-head {
        background: linear-gradient(180deg, #fff7f6 0%, #fff0ee 100%);
      }

      .bucket[data-bucket="Regulation, Safety & Incidents"] .bucket-head {
        background: linear-gradient(180deg, #fdf7ff 0%, #f5efff 100%);
      }

      .bucket[data-bucket="All News"] {
        grid-column: 1 / -1;
      }

      .bucket[data-bucket="All News"] .bucket-head {
        background: linear-gradient(180deg, #f6fbfc 0%, #eef5f6 100%);
      }

      .bucket-title {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .bucket-title h3 {
        margin: 0;
        font-size: 19px;
      }

      .bucket-subtitle {
        color: var(--text-soft);
        font-size: 13px;
      }

      .bucket-body {
        display: grid;
      }

      .bucket-footer {
        padding: 0 18px 18px;
      }

      .bucket-expand {
        padding: 9px 12px;
        border-radius: 12px;
        border: 1px solid var(--line);
        background: var(--surface-muted);
        color: var(--text);
        font-weight: 700;
        cursor: pointer;
      }

      .article-row {
        display: grid;
        grid-template-columns: 190px minmax(0, 1fr);
        gap: 16px;
        padding: 16px 18px;
        border-top: 1px solid var(--line);
        align-items: start;
      }

      .article-row:first-child {
        border-top: 0;
      }

      .article-meta {
        display: grid;
        gap: 8px;
      }

      .source-pill {
        width: fit-content;
        padding: 5px 9px;
        background: var(--accent-soft);
        color: var(--accent);
      }

      .priority-pill {
        width: fit-content;
        padding: 5px 9px;
        color: #fff;
      }

      .freshness-pill {
        width: fit-content;
        padding: 5px 9px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        background: #dcfce7;
        color: #166534;
      }

      .priority-critical {
        background: var(--critical);
      }

      .priority-high {
        background: var(--high);
      }

      .priority-medium {
        background: var(--medium);
      }

      .priority-low {
        background: var(--low);
      }

      .article-time {
        color: var(--text-soft);
        font-size: 13px;
      }

      .article-main {
        display: grid;
        gap: 8px;
        min-width: 0;
      }

      .article-main h4 {
        margin: 0;
        font-size: 17px;
        line-height: 1.28;
      }

      .article-title-link {
        color: inherit;
        text-decoration: none;
      }

      .article-title-link:hover {
        color: var(--accent);
        text-decoration: underline;
      }

      .article-brief {
        margin: 0;
        color: var(--text-soft);
        line-height: 1.5;
        font-size: 14px;
      }

      .article-reason {
        margin: -2px 0 0;
        color: #3f555e;
        font-size: 13px;
        font-weight: 600;
      }

      .tag-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .tag {
        padding: 5px 9px;
        background: #ebf0f2;
        color: #455861;
      }

      .tag-port {
        background: #dcecef;
        color: #0f5966;
      }

      .tag-region {
        background: #eef2f4;
        color: #5b6e77;
      }

      .tag-client {
        background: #dbeafe;
        color: #1e40af;
      }

      .tag-competitor {
        background: #fee2e2;
        color: #991b1b;
      }

      .tag-supplier {
        background: #fef3c7;
        color: #92400e;
      }

      .tag-signal {
        background: #efe7ff;
        color: #6d28d9;
      }

      .tag-energy {
        background: #dcfce7;
        color: #166534;
      }

      .tag-paywall {
        background: #e5e7eb;
        color: #374151;
      }

      .tag-topic {
        background: #ebf0f2;
        color: #455861;
      }

      .empty-state {
        padding: 24px 20px 28px;
        color: var(--text-soft);
      }

      #loginOverlay {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background:
          radial-gradient(circle at top right, rgba(15, 89, 102, 0.09), transparent 28%),
          linear-gradient(180deg, #f7f9fb 0%, var(--bg) 100%);
      }

      .login-card {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 18px;
        box-shadow: var(--shadow);
        padding: 36px 40px;
        width: 100%;
        max-width: 420px;
      }

      .login-card h2 {
        margin: 14px 0 6px;
        font-size: 28px;
      }

      .login-copy {
        margin: 0 0 20px;
        color: var(--text-soft);
        font-size: 14px;
        line-height: 1.5;
      }

      .login-error {
        margin-top: 10px;
        color: var(--danger);
        font-size: 14px;
        font-weight: 600;
      }

      .entity-sections {
        display: grid;
        gap: 16px;
        grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
        align-items: start;
        margin-bottom: 16px;
      }

      .entity-panel {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 18px;
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .entity-panel-head {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
        padding: 16px 18px;
        border-bottom: 1px solid var(--line);
      }

      .entity-panel-head h3 {
        margin: 0;
        font-size: 19px;
      }

      .entity-panel[data-category="suppliers"] .entity-panel-head {
        background: linear-gradient(180deg, #fffdf5 0%, #fef9ec 100%);
      }

      .entity-panel[data-category="clients"] .entity-panel-head {
        background: linear-gradient(180deg, #f5f8ff 0%, #eef3ff 100%);
      }

      .entity-panel[data-category="competitors"] .entity-panel-head {
        background: linear-gradient(180deg, #fff5f5 0%, #ffeeee 100%);
      }

      .entity-chips {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        padding: 12px 18px;
        border-bottom: 1px solid var(--line);
      }

      .entity-chip {
        display: inline-flex;
        align-items: center;
        padding: 5px 10px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: var(--surface);
        color: var(--text-soft);
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        letter-spacing: 0.02em;
      }

      .entity-chip.active[data-category="suppliers"] {
        background: #92400e;
        border-color: #92400e;
        color: #fff;
      }

      .entity-chip.active[data-category="clients"] {
        background: #1e40af;
        border-color: #1e40af;
        color: #fff;
      }

      .entity-chip.active[data-category="competitors"] {
        background: #991b1b;
        border-color: #991b1b;
        color: #fff;
      }

      .entity-panel-body {
        display: grid;
      }

      .entity-range-row {
        display: flex;
        gap: 4px;
        padding: 10px 18px;
        border-bottom: 1px solid var(--line);
        background: var(--surface-muted);
      }

      .entity-range-btn {
        padding: 4px 10px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: var(--surface);
        color: var(--text-soft);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        cursor: pointer;
      }

      .entity-range-btn.active {
        background: var(--accent);
        border-color: var(--accent);
        color: #fff;
      }

      @media (max-width: 1180px) {
        .overview {
          align-items: start;
          flex-direction: column;
        }

        .control-grid,
        .primary-control-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .field-wide {
          grid-column: span 2;
        }

        .summary-strip,
        .entity-sections,
        .buckets {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 860px) {
        .control-grid,
        .primary-control-grid {
          grid-template-columns: 1fr;
        }

        .field-wide {
          grid-column: span 1;
        }

        .article-row {
          grid-template-columns: 1fr;
          gap: 10px;
        }
      }

      @media (max-width: 680px) {
        .page {
          padding-inline: 14px;
        }

        .status-grid,
        .summary-strip,
        .entity-sections,
        .buckets {
          grid-template-columns: 1fr;
        }
      }

      /* Entity nav button */
      .entities-nav-btn {
        padding: 5px 12px;
        border-radius: 8px;
        border: 1px solid var(--line);
        background: var(--surface-muted);
        color: var(--text-soft);
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        cursor: pointer;
        flex-shrink: 0;
      }

      .entities-nav-btn.active {
        background: var(--accent);
        border-color: var(--accent);
        color: #fff;
      }

      /* Entity directory */
      .entity-dir-header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 20px;
      }

      .entity-dir-header h2 {
        margin: 0;
        font-size: 22px;
      }

      .entity-dir-group {
        margin-bottom: 28px;
      }

      .entity-dir-group-title {
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--text-soft);
        margin: 0 0 12px;
      }

      .entity-dir-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
        gap: 10px;
      }

      .entity-card {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 14px 16px;
        cursor: pointer;
        transition: border-color 0.15s, box-shadow 0.15s;
        display: grid;
        gap: 5px;
        box-shadow: var(--shadow);
      }

      .entity-card:hover {
        border-color: var(--accent);
        box-shadow: 0 4px 16px rgba(15, 89, 102, 0.14);
      }

      .entity-card-name {
        font-weight: 700;
        font-size: 14px;
        line-height: 1.3;
      }

      .entity-card-meta {
        display: flex;
        align-items: center;
        gap: 6px;
        flex-wrap: wrap;
      }

      .entity-card-badge {
        display: inline-flex;
        align-items: center;

    <script src="./data/articles.js"></script>
    <script>
      const AUTH_KEY = "mnd_auth";
      const DEPARTMENT_KEY = "mnd_department";
      const COLUMN_PREFS_KEY = "mnd_entity_columns";
      const PASSWORD_HASH = "9175c025fea32b1448a98927bb679160119657ac11cbd028b51264a21af91db8";

      async function sha256hex(text) {
        const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(text));
        return Array.from(new Uint8Array(buf)).map((b) => b.toString(16).padStart(2, "0")).join("");
      }

      function unlockDashboard() {
        document.getElementById("loginOverlay").style.display = "none";
        document.getElementById("mainPage").style.display = "";
      }

      (function initAuth() {
        if (localStorage.getItem(AUTH_KEY) === PASSWORD_HASH) {
          unlockDashboard();
          return;
        }

        const loginBtn = document.getElementById("loginButton");
        const loginInput = document.getElementById("loginPassword");
        const loginError = document.getElementById("loginError");

        async function attemptLogin() {
          const hash = await sha256hex(loginInput.value);
          if (hash === PASSWORD_HASH) {
            localStorage.setItem(AUTH_KEY, hash);
            loginError.style.display = "none";
            unlockDashboard();
            boot();
          } else {
            loginError.style.display = "";
            loginInput.value = "";
            loginInput.focus();
          }
        }

        loginBtn.addEventListener("click", attemptLogin);
        loginInput.addEventListener("keydown", (e) => { if (e.key === "Enter") attemptLogin(); });
      })();

      const PRIORITY_LEVELS = { critical: 3, high: 2, medium: 1, low: 0 };
      const PRIORITY_LABELS = { critical: "Critical", high: "High", medium: "Medium", low: "Low" };
      const GENERIC_TOPIC_TAGS = new Set(["Maritime", "News", "Industry", "Markets"]);
      const BUCKETS = [
        {
          key: "All News",
          title: "All News",
          subtitle: "Complete filtered stream, including items also shown in the entity panels."
        }
      ];
      const OPERATIONS_TAGS = new Set([
        "government",
        "imo",
        "operations",
        "regulation",
        "safety",
        "compliance",
        "infrastructure",
        "port services"
      ]);

      const ENTITY_CATEGORY_CONFIG = [
        { key: "suppliers", label: "Supplier News", subtitle: "News mentioning tracked suppliers" },
        { key: "clients", label: "Client News", subtitle: "News mentioning tracked clients" },
        { key: "competitors", label: "Competitor News", subtitle: "News mentioning tracked competitors" }
      ];
      const DEFAULT_ENTITY_COLUMNS = ENTITY_CATEGORY_CONFIG.map((config) => config.key);
      const DEFAULT_DEPARTMENT_PROFILES = [
        { id: "all", label: "All departments", sourceIds: [], tags: [], entityCategories: [] }
      ];

      const DATE_RANGE_OPTIONS = [
        { value: "1d", label: "1d", days: 1 },
        { value: "7d", label: "7d", days: 7 },
        { value: "30d", label: "30d", days: 30 },
        { value: "90d", label: "90d", days: 90 },
        { value: "6mo", label: "6mo", days: 180 }
      ];

      function loadVisibleEntityColumns() {
        const stored = localStorage.getItem(COLUMN_PREFS_KEY);
        if (!stored) return [...DEFAULT_ENTITY_COLUMNS];

        try {
          const columns = JSON.parse(stored);
          if (!Array.isArray(columns)) {
            localStorage.setItem(COLUMN_PREFS_KEY, JSON.stringify(DEFAULT_ENTITY_COLUMNS));
            return [...DEFAULT_ENTITY_COLUMNS];
          }
          if (columns.some((key) => !DEFAULT_ENTITY_COLUMNS.includes(key))) {
            localStorage.setItem(COLUMN_PREFS_KEY, JSON.stringify(DEFAULT_ENTITY_COLUMNS));
            return [...DEFAULT_ENTITY_COLUMNS];
          }
          return columns;
        } catch {
          localStorage.setItem(COLUMN_PREFS_KEY, JSON.stringify(DEFAULT_ENTITY_COLUMNS));
          return [...DEFAULT_ENTITY_COLUMNS];
        }
      }

      const state = {
        data: window.__DASHBOARD_DATA__ || {
          articles: [],
          sources: [],
          topics: [],
          departmentProfiles: DEFAULT_DEPARTMENT_PROFILES,
          errors: []
        },
        activeAudience: "Multraship",
        activeDepartment: localStorage.getItem(DEPARTMENT_KEY) || "all",
        visibleEntityColumns: loadVisibleEntityColumns(),
        bucketVisibility: {},
        selectedEntities: { suppliers: null, clients: null, competitors: null },
        entityDateRange: { suppliers: "30d", clients: "30d", competitors: "30d" },
        entityVisibility: { suppliers: 10, clients: 10, competitors: 10 },
        historyData: null,
        historyLoading: false,
        activeView: "dashboard",
        openEntityName: null,
        overlayTab: "profile",
        stocksData: null,
        stocksLoading: false,
      };

      const elements = {
        errors: document.getElementById("errors"),
        generatedAt: document.getElementById("generatedAt"),
        articleCount: document.getElementById("articleCount"),
        visibleCount: document.getElementById("visibleCount"),
        departmentFilter: document.getElementById("departmentFilter"),
        sourceFilter: document.getElementById("sourceFilter"),
        topicFilter: document.getElementById("topicFilter"),
        highPriorityOnly: document.getElementById("highPriorityOnly"),
        entityFilter: document.getElementById("entityFilter"),
        searchInput: document.getElementById("searchInput"),
        paywalledOnly: document.getElementById("paywalledOnly"),
        clearFiltersButton: document.getElementById("clearFiltersButton"),
        refreshButton: document.getElementById("refreshButton"),
        refreshStatus: document.getElementById("refreshStatus"),
        bucketContainer: document.getElementById("bucketContainer"),
        boardSummary: document.getElementById("boardSummary"),
        toggleButtons: Array.from(document.querySelectorAll(".toggle-button")),
        columnToggleButtons: Array.from(document.querySelectorAll(".column-toggle-button")),
        entitiesNavBtn: document.getElementById("entitiesNavBtn"),
        entityDirectoryView: document.getElementById("entityDirectoryView"),
        entityDirContent: document.getElementById("entityDirContent"),
        entityOverlayBackdrop: document.getElementById("entityOverlayBackdrop"),
        entityOverlay: document.getElementById("entityOverlay"),
        overlayEntityName: document.getElementById("overlayEntityName"),
        overlayEntityBadge: document.getElementById("overlayEntityBadge"),
        overlayNav: document.getElementById("overlayNav"),
        overlayBody: document.getElementById("overlayBody"),
        entityOverlayClose: document.getElementById("entityOverlayClose"),
      };

      function formatDate(value) {
        if (!value) return "Unknown date";
        try {
          return new Intl.DateTimeFormat(undefined, {
            year: "numeric",
            month: "short",
            day: "numeric",
            hour: "2-digit",
            minute: "2-digit"
          }).format(new Date(value));
        } catch {
          return value;
        }
      }

      function formatGenerated(value) {
        if (!value) return "No data";
        return formatDate(value);
      }

      function populateSelect(select, options, placeholder) {
        select.innerHTML = "";
        const baseOption = document.createElement("option");
        baseOption.value = "all";
        baseOption.textContent = placeholder;
        select.appendChild(baseOption);

        options.forEach((option) => {
          const el = document.createElement("option");
          el.value = option;
          el.textContent = option;
          select.appendChild(el);
        });
      }

      function getDepartmentProfiles() {
        const profiles = state.data.departmentProfiles || DEFAULT_DEPARTMENT_PROFILES;
        if (profiles.some((profile) => profile.id === "all")) return profiles;
        return [...DEFAULT_DEPARTMENT_PROFILES, ...profiles];
      }

      function getActiveDepartmentProfile() {
        const profiles = getDepartmentProfiles();
        const profile = profiles.find((item) => item.id === state.activeDepartment);
        if (profile) return profile;
        state.activeDepartment = "all";
        localStorage.setItem(DEPARTMENT_KEY, state.activeDepartment);
        if (elements.departmentFilter) elements.departmentFilter.value = state.activeDepartment;
        return profiles.find((item) => item.id === "all") || DEFAULT_DEPARTMENT_PROFILES[0];
      }

      function populateDepartmentSelect() {
        const profiles = getDepartmentProfiles();
        const knownProfile = profiles.some((profile) => profile.id === state.activeDepartment);
        if (!knownProfile) {
          state.activeDepartment = "all";
          localStorage.setItem(DEPARTMENT_KEY, state.activeDepartment);
        }

        elements.departmentFilter.innerHTML = "";
        profiles.forEach((profile) => {
          const option = document.createElement("option");
          option.value = profile.id;
          option.textContent = profile.label;
          elements.departmentFilter.appendChild(option);
        });
        elements.departmentFilter.value = state.activeDepartment;
      }

      function createTextElement(tag, text, className) {
        const element = document.createElement(tag);
        if (className) element.className = className;
        element.textContent = text;
        return element;
      }

      function normalizeSearchText(value) {
        return String(value || "")
          .normalize("NFD")
          .replace(/[\u0300-\u036f]/g, "")
          .toLowerCase()
          .replace(/[^a-z0-9]+/g, " ")
          .replace(/\s+/g, " ")
          .trim();
      }

      function getArticleSearchText(article) {
        const parts = [
          article.title,
          article.excerpt,
          article.source,
          article.sourceId,
          ...(article.tags || []),
          ...(article.businessTags || []),
          ...(article.priorityReasons || []),
          ...(article.entities || []).flatMap((entity) => [entity.name, entity.category]),
          ...(article.locations || []).flatMap((location) => [location.name, location.type])
        ];
        return normalizeSearchText(parts.join(" "));
      }

      function matchesSearchQuery(article, query) {
        const tokens = normalizeSearchText(query).split(" ").filter(Boolean);
        if (tokens.length === 0) return true;
        const haystack = getArticleSearchText(article);
        return tokens.every((token) => {
          if (haystack.includes(token)) return true;
          if (token.endsWith("s") && token.length > 3) return haystack.includes(token.slice(0, -1));
          return false;
        });
      }

      function getArticleOptions(selector) {
        return Array.from(
          new Set((state.data.articles || []).flatMap(selector).filter(Boolean))
        ).sort((a, b) => a.localeCompare(b));
      }

      function renderErrors(errors) {
        elements.errors.innerHTML = "";
        if (!errors || errors.length === 0) return;

        const box = document.createElement("div");
        box.className = "error-box";
        box.appendChild(createTextElement("strong", "Feed refresh warnings"));

        errors.forEach((error) => {
          box.appendChild(createTextElement("div", `${error.source}: ${error.message}`));
        });

        elements.errors.appendChild(box);
      }

      function setRefreshStatus(message) {
        elements.refreshStatus.textContent = message;
      }

      function getPriorityLevel(article) {
        return PRIORITY_LEVELS[article.priorityBand] ?? 0;
      }

      function matchesAudience(article) {
        if (state.activeAudience === "Both") {
          return article.audience === "Both";
        }
        return article.audience === state.activeAudience || article.audience === "Both";
      }

      function getArticleCategories(article) {
        const categories = [];
        const seen = new Set();
        (article.entities || []).forEach((entity) => {
          if (seen.has(entity.category)) return;
          seen.add(entity.category);
          categories.push(entity.category);
        });
        return categories;
      }

      function normalizeFilterValue(value) {
        return normalizeSearchText(value);
      }

      function getProfileSet(profile, key) {
        return new Set((profile[key] || []).map(normalizeFilterValue).filter(Boolean));
      }

      function matchesDepartment(article) {
        const profile = getActiveDepartmentProfile();
        if (!profile || profile.id === "all") return true;

        const sourceIds = getProfileSet(profile, "sourceIds");
        const tags = getProfileSet(profile, "tags");
        const entityCategories = getProfileSet(profile, "entityCategories");
        if (sourceIds.size === 0 && tags.size === 0 && entityCategories.size === 0) return false;

        if (sourceIds.has(normalizeFilterValue(article.sourceId))) return true;

        const articleTags = [...(article.tags || []), ...(article.businessTags || [])].map(normalizeFilterValue);
        if (articleTags.some((tag) => tags.has(tag))) return true;

        const categories = getArticleCategories(article).map(normalizeFilterValue);
        return categories.some((category) => entityCategories.has(category));
      }

      function createBrief(article) {
        const clean = (article.excerpt || "").replace(/\s+/g, " ").trim();
        if (!clean) {
          const fallback = (article.businessTags && article.businessTags[0]) || (article.tags && article.tags[0]);
          return fallback ? `${fallback}.` : "Open the source article for details.";
        }
        if (clean.length <= 160) return clean;
        return `${clean.slice(0, 157).trim()}...`;
      }

      function matchesPriority(article) {
        return !elements.highPriorityOnly.checked || getPriorityLevel(article) >= PRIORITY_LEVELS.high;
      }

      function matchesFilters(article) {
        const sourceValue = elements.sourceFilter.value;
        const topicValue = elements.topicFilter.value;
        const entityValue = elements.entityFilter.value;
        const searchValue = elements.searchInput.value;
        const paywalledOnly = elements.paywalledOnly.checked;

        if (!matchesAudience(article)) return false;
        if (!matchesDepartment(article)) return false;
        if (sourceValue !== "all" && article.source !== sourceValue) return false;
        if (topicValue !== "all" && !(article.tags || []).includes(topicValue)) return false;
        if (entityValue !== "all") {
          const hasEntity = getArticleCategories(article).includes(entityValue);
          if (!hasEntity) return false;
        }
        if (!matchesPriority(article)) return false;
        if (paywalledOnly && !article.paywalled) return false;
        if (!matchesSearchQuery(article, searchValue)) return false;
        return true;
      }

      function sortArticles(articles) {
        const sorted = [...articles];
        sorted.sort(compareArticlesNewest);
        return sorted;
      }

      function getArticleTime(article) {
        const time = Date.parse(article.publishedAt || "");
        return Number.isFinite(time) ? time : null;
      }

      function compareArticlesNewest(a, b) {
        const left = getArticleTime(a);
        const right = getArticleTime(b);
        if (left !== null && right !== null && right !== left) return right - left;
        if (left !== null && right === null) return -1;
        if (left === null && right !== null) return 1;

        const priorityDiff = (Number(b.priorityScore) || 0) - (Number(a.priorityScore) || 0);
        if (priorityDiff !== 0) return priorityDiff;

        return (a.source || "").localeCompare(b.source || "")
          || (a.title || "").localeCompare(b.title || "")
          || (a.url || "").localeCompare(b.url || "");
      }

      function buildBuckets(articles) {
        if (articles.length === 0) return [];
        return [{ ...BUCKETS[0], items: articles }];
      }

      function getBucketLimit(bucketKey) {
        const defaultLimit = 12;
        return state.bucketVisibility[`${state.activeAudience}:${bucketKey}`] || defaultLimit;
      }

      function setBucketLimit(bucketKey, limit) {
        state.bucketVisibility[`${state.activeAudience}:${bucketKey}`] = limit;
      }

      function renderOverviewCounts(buckets) {
        elements.topBucketCounts.innerHTML = "";
        buckets.forEach((bucket) => {
          const pill = createTextElement("span", `${bucket.title}: ${bucket.items.length}`, "count-pill");
          elements.topBucketCounts.appendChild(pill);
        });
      }

      function getGeneratedTime() {
        const generatedAt = Date.parse(state.data.generatedAt || "");
        return Number.isFinite(generatedAt) ? generatedAt : Date.now();
      }

      function isWithinLast24Hours(article) {
        const publishedAt = getArticleTime(article);
        if (publishedAt === null) return false;
        const age = getGeneratedTime() - publishedAt;
        return age >= 0 && age <= 24 * 60 * 60 * 1000;
      }

      function isOperationsOrRegulationArticle(article) {
        return [...(article.tags || []), ...(article.businessTags || [])]
          .map(normalizeFilterValue)
          .some((tag) => OPERATIONS_TAGS.has(tag));
      }

      function renderBoardSummary(articles) {
        elements.boardSummary.innerHTML = "";
        const last24 = articles.filter(isWithinLast24Hours);

        const summary = [
          {
            label: "Filtered new in 24h",
            value: last24.length,
            copy: "Current filters, latest day"
          },
          {
            label: "Filtered high priority",
            value: last24.filter((article) => ["critical", "high"].includes(article.priorityBand)).length,
            copy: "High and critical in 24h"
          },
          {
            label: "Filtered operations",
            value: last24.filter(isOperationsOrRegulationArticle).length,
            copy: "IMO, regulation, safety or port ops"
          },
          {
            label: "Filtered entity matches",
            value: last24.filter((article) =>
              getArticleCategories(article).some((category) => ["suppliers", "clients", "competitors"].includes(category))
            ).length,
            copy: "Tracked suppliers, clients or competitors"
          }
        ];

        summary.forEach((item) => {
          const card = document.createElement("div");
          card.className = "summary-card";
          card.appendChild(createTextElement("span", item.label, "summary-label"));
          card.appendChild(createTextElement("span", String(item.value), "summary-value"));
          card.appendChild(createTextElement("span", item.copy, "summary-copy"));
          elements.boardSummary.appendChild(card);
        });
      }

      function createTag(text) {
        let className = "tag";
        if (text.startsWith("Port:")) {
          className += " tag-port";
        } else if (text.startsWith("Region:")) {
          className += " tag-region";
        } else if (text === "Client") {
          className += " tag-client";
        } else if (text === "Competitor") {
          className += " tag-competitor";
        } else if (text === "Supplier") {
          className += " tag-supplier";
        } else if (text === "Energy Transition") {
          className += " tag-energy";
        } else if (["Incident", "Disruption", "Regulation", "Infrastructure", "Terminal Expansion"].includes(text)) {
          className += " tag-signal";
        } else if (text === "Paywalled") {
          className += " tag-paywall";
        } else {
          className += " tag-topic";
        }
        return createTextElement("span", text, className);
      }

      function getDisplayTags(article) {
        const tags = [];
        const seen = new Set();

        (article.businessTags || []).forEach((tag) => {
          if (seen.has(tag)) return;
          seen.add(tag);
          tags.push(tag);
        });

        (article.tags || []).forEach((tag) => {
          if (GENERIC_TOPIC_TAGS.has(tag) || seen.has(tag) || tags.length >= 6) return;
          seen.add(tag);
          tags.push(tag);
        });

        if (article.paywalled && !seen.has("Paywalled")) {
          tags.push("Paywalled");
        }

        return tags.slice(0, 7);
      }

      function createArticleRow(article) {
        const row = document.createElement("article");
        row.className = "article-row";

        const meta = document.createElement("div");
        meta.className = "article-meta";
        meta.appendChild(createTextElement("span", article.source, "source-pill"));
        const priorityRow = document.createElement("div");
        priorityRow.style.cssText = "display:flex;flex-wrap:wrap;gap:4px;align-items:center;";
        priorityRow.appendChild(createTextElement(
          "span",
          PRIORITY_LABELS[article.priorityBand] || "Low",
          `priority-pill priority-${article.priorityBand || "low"}`
        ));
        (article.entities || []).forEach(({ name, category }) => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = `entity-chip-link ${category || ""}`;
          btn.textContent = name;
          btn.addEventListener("click", (e) => { e.preventDefault(); e.stopPropagation(); openEntityOverlay(name); });
          priorityRow.appendChild(btn);
        });
        meta.appendChild(priorityRow);
        if (isWithinLast24Hours(article)) {
          meta.appendChild(createTextElement("span", "New 24h", "freshness-pill"));
        }
        meta.appendChild(createTextElement("span", formatDate(article.publishedAt), "article-time"));

        const main = document.createElement("div");
        main.className = "article-main";
        const title = document.createElement("h4");
        const titleLink = document.createElement("a");
        titleLink.className = "article-title-link";
        titleLink.href = article.url;
        titleLink.target = "_blank";
        titleLink.rel = "noreferrer noopener";
        titleLink.textContent = article.title;
        title.appendChild(titleLink);
        main.appendChild(title);
        main.appendChild(createTextElement("p", createBrief(article), "article-brief"));

        if (article.priorityReasons && article.priorityReasons.length > 0) {
          main.appendChild(
            createTextElement("p", article.priorityReasons.slice(0, 2).join(" | "), "article-reason")
          );
        }

        const tags = document.createElement("div");
        tags.className = "tag-row";
        getDisplayTags(article).forEach((tag) => tags.appendChild(createTag(tag)));
        main.appendChild(tags);

        row.append(meta, main);
        return row;
      }

      function renderBuckets(buckets) {
        elements.bucketContainer.innerHTML = "";
        if (buckets.length === 0) {
          elements.bucketContainer.appendChild(
            createTextElement("div", "No articles match the current audience and filters.", "card empty-state")
          );
          return;
        }

        buckets.forEach((bucket) => {
          const section = document.createElement("section");
          section.className = "bucket";
          section.dataset.bucket = bucket.key;

          const head = document.createElement("div");
          head.className = "bucket-head";

          const titleWrap = document.createElement("div");
          titleWrap.className = "bucket-title";
          const titleBlock = document.createElement("div");
          titleBlock.appendChild(createTextElement("h3", bucket.title));
          titleBlock.appendChild(createTextElement("div", bucket.subtitle, "bucket-subtitle"));
          titleWrap.appendChild(titleBlock);

          head.append(titleWrap, createTextElement("span", String(bucket.items.length), "count-pill"));

          const body = document.createElement("div");
          body.className = "bucket-body";
          const visibleLimit = getBucketLimit(bucket.key);
          bucket.items.slice(0, visibleLimit).forEach((article) => body.appendChild(createArticleRow(article)));

          section.append(head, body);

          if (bucket.items.length > 12) {
            const footer = document.createElement("div");
            footer.className = "bucket-footer";
            const button = document.createElement("button");
            button.className = "bucket-expand";
            button.type = "button";

            if (visibleLimit < bucket.items.length) {
              const nextLimit = Math.min(bucket.items.length, visibleLimit + 12);
              button.textContent = `Show more (${nextLimit} visible)`;
              button.addEventListener("click", () => {
                setBucketLimit(bucket.key, nextLimit);
                render();
              });
            } else {
              button.textContent = "Show less";
              button.addEventListener("click", () => {
                setBucketLimit(bucket.key, 12);
                render();
              });
            }

            footer.appendChild(button);
            section.appendChild(footer);
          }

          elements.bucketContainer.appendChild(section);
        });
      }

      function updateAudienceMeta() {
        elements.toggleButtons.forEach((button) => {
          button.classList.toggle("active", button.dataset.audience === state.activeAudience);
        });
      }

      async function loadHistoryData() {
        if (state.historyLoading || state.historyData !== null) return;
        state.historyLoading = true;
        try {
          const response = await fetch("./data/articles-history.json", { cache: "no-store" });
          if (response.ok) state.historyData = await response.json();
        } catch {
          // fall back to dashboard data silently
        } finally {
          state.historyLoading = false;
        }
      }

      function getArticlesForEntitySection(category) {
        const range = state.entityDateRange[category] || "30d";
        const option = DATE_RANGE_OPTIONS.find((o) => o.value === range) || DATE_RANGE_OPTIONS[1];
        const cutoffMs = Date.now() - option.days * 24 * 60 * 60 * 1000;
        const source =
          option.days > 30 && state.historyData
            ? state.historyData.articles || []
            : state.data.articles || [];
        return source.filter((article) => {
          if (!matchesFilters(article)) return false;
          if (!article.publishedAt) return false;
          return new Date(article.publishedAt).getTime() >= cutoffMs;
        });
      }

      function getEntitiesForCategory(articles, category) {
        const counts = new Map();
        articles.forEach((article) => {
          (article.entities || []).forEach((entity) => {
            if (entity.category === category) {
              counts.set(entity.name, (counts.get(entity.name) || 0) + 1);
            }
          });
        });
        return Array.from(counts.entries())
          .sort((a, b) => b[1] - a[1])
          .map(([name, count]) => ({ name, count }));
      }

      function getEntityArticles(articles, category, selectedEntity) {
        return sortArticles(articles
          .filter((article) =>
            (article.entities || []).some(
              (e) => e.category === category && (selectedEntity === null || e.name === selectedEntity)
            )
          ));
      }

      function renderEntitySection(container, catConfig) {
        const { key, label, subtitle } = catConfig;
        const selectedEntity = state.selectedEntities[key];
        const panelArticles = getArticlesForEntitySection(key);
        const entities = getEntitiesForCategory(panelArticles, key);
        const allArticles = getEntityArticles(panelArticles, key, selectedEntity);
        const visibleLimit = state.entityVisibility[key] || 10;
        const articles = allArticles.slice(0, visibleLimit);

        const panel = document.createElement("section");
        panel.className = "entity-panel";
        panel.dataset.category = key;

        const head = document.createElement("div");
        head.className = "entity-panel-head";
        const titleBlock = document.createElement("div");
        titleBlock.appendChild(createTextElement("h3", label));
        titleBlock.appendChild(createTextElement("div", subtitle, "bucket-subtitle"));
        head.appendChild(titleBlock);
        head.appendChild(createTextElement("span", String(allArticles.length), "count-pill"));
        panel.appendChild(head);

        const rangeRow = document.createElement("div");
        rangeRow.className = "entity-range-row";
        const currentRange = state.entityDateRange[key] || "30d";
        DATE_RANGE_OPTIONS.forEach(({ value, label: rangeLabel, days }) => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "entity-range-btn" + (currentRange === value ? " active" : "");
          btn.textContent = rangeLabel;
          btn.addEventListener("click", async () => {
            state.entityDateRange[key] = value;
            if (days > 30 && state.historyData === null) await loadHistoryData();
            renderEntitySections();
          });
          rangeRow.appendChild(btn);
        });
        panel.appendChild(rangeRow);

        if (entities.length > 0) {
          const chips = document.createElement("div");
          chips.className = "entity-chips";

          const allChip = document.createElement("button");
          allChip.type = "button";
          allChip.className = "entity-chip" + (selectedEntity === null ? " active" : "");
          allChip.dataset.category = key;
          allChip.textContent = "All";
          allChip.addEventListener("click", () => {
            state.selectedEntities[key] = null;
            state.entityVisibility[key] = 10;
            renderEntitySections();
          });
          chips.appendChild(allChip);

          entities.forEach(({ name, count }) => {
            const chip = document.createElement("button");
            chip.type = "button";
            chip.className = "entity-chip" + (selectedEntity === name ? " active" : "");
            chip.dataset.category = key;
            chip.textContent = `${name} (${count})`;
            chip.addEventListener("click", () => {
              state.selectedEntities[key] = state.selectedEntities[key] === name ? null : name;
              state.entityVisibility[key] = 10;
              renderEntitySections();
            });
            chips.appendChild(chip);
          });

          panel.appendChild(chips);
        }

        const body = document.createElement("div");
        body.className = "entity-panel-body";

        if (articles.length === 0) {
          body.appendChild(
            createTextElement("div", "No articles found for the current audience and selection.", "empty-state")
          );
        } else {
          articles.forEach((article) => body.appendChild(createArticleRow(article)));
        }

        panel.appendChild(body);

        if (allArticles.length > 10) {
          const footer = document.createElement("div");
          footer.className = "bucket-footer";
          const btn = document.createElement("button");
          btn.className = "bucket-expand";
          btn.type = "button";
          if (visibleLimit < allArticles.length) {
            btn.textContent = `Show 10 more (${Math.min(allArticles.length, visibleLimit + 10)} of ${allArticles.length})`;
            btn.addEventListener("click", () => {
              state.entityVisibility[key] = visibleLimit + 10;
              renderEntitySections();
            });
          } else {
            btn.textContent = "Show less";
            btn.addEventListener("click", () => {
              state.entityVisibility[key] = 10;
              renderEntitySections();
            });
          }
          footer.appendChild(btn);
          panel.appendChild(footer);
        }

        container.appendChild(panel);
      }

      function renderEntitySections() {
        const container = document.getElementById("entityContainer");
        if (!container) return;
        container.innerHTML = "";
        if (state.activeAudience === "Novatug") return;
        const visible = new Set(state.visibleEntityColumns);
        ENTITY_CATEGORY_CONFIG
          .filter((c) => visible.has(c.key))
          .forEach((catConfig) => renderEntitySection(container, catConfig));
      }

      function syncColumnToggleButtons() {
        const visible = new Set(state.visibleEntityColumns);
        elements.columnToggleButtons.forEach((btn) => {
          btn.classList.toggle("active", visible.has(btn.dataset.column));
        });
      }

      function render() {
        updateAudienceMeta();
        const filtered = sortArticles((state.data.articles || []).filter(matchesFilters));
        const buckets = buildBuckets(filtered);
        renderBoardSummary(filtered);
        renderBuckets(buckets);
        elements.visibleCount.textContent = String(filtered.length);
        renderEntitySections();
      }

      function syncDataToUi() {
        const currentSource = elements.sourceFilter.value;
        const currentTopic = elements.topicFilter.value;
        const sources = getArticleOptions((article) => [article.source]);
        const topics = getArticleOptions((article) => article.tags || []);

        populateDepartmentSelect();
        populateSelect(elements.sourceFilter, sources, "All sources");
        populateSelect(elements.topicFilter, topics, "All topics");

        if (sources.includes(currentSource)) {
          elements.sourceFilter.value = currentSource;
        }
        if (topics.includes(currentTopic)) {
          elements.topicFilter.value = currentTopic;
        }

        elements.generatedAt.textContent = formatGenerated(state.data.generatedAt);
        elements.articleCount.textContent = String((state.data.articles || []).length);
        renderErrors(state.data.errors || []);
      }

      async function loadApiData() {
        const response = await fetch("./api/data", { cache: "no-store" });
        if (!response.ok) {
          throw new Error(`Failed to load data: ${response.status}`);
        }
        state.data = await response.json();
        syncDataToUi();
        render();
      }

      async function refreshFeeds() {
        if (window.location.protocol === "file:") {
          setRefreshStatus("Start scripts/local_server.py to use the refresh button.");
          return;
        }

        elements.refreshButton.disabled = true;
        setRefreshStatus("Refreshing feeds...");

        try {
          const response = await fetch("./api/refresh", {
            method: "POST",
            headers: { "Content-Type": "application/json" }
          });
          const payload = await response.json();
          if (!response.ok || !payload.ok) {
            throw new Error(payload.stderr || payload.stdout || `Refresh failed: ${response.status}`);
          }
          await loadApiData();
          setRefreshStatus(`Updated ${formatGenerated(state.data.generatedAt)}`);
        } catch (error) {
          setRefreshStatus(error.message);
        } finally {
          elements.refreshButton.disabled = false;
        }
      }

      // ── Entity directory & overlay ──────────────────────────────────────────

      function clearFilters() {
        state.activeDepartment = "all";
        localStorage.setItem(DEPARTMENT_KEY, state.activeDepartment);
        elements.departmentFilter.value = state.activeDepartment;
        elements.searchInput.value = "";
        elements.sourceFilter.value = "all";
        elements.topicFilter.value = "all";
        elements.entityFilter.value = "all";
        elements.highPriorityOnly.checked = false;
        elements.paywalledOnly.checked = false;
        render();
      }

      function toggleEntityColumn(column) {
        if (!DEFAULT_ENTITY_COLUMNS.includes(column)) {
          state.visibleEntityColumns = [...DEFAULT_ENTITY_COLUMNS];
        } else if (state.visibleEntityColumns.includes(column)) {
          state.visibleEntityColumns = state.visibleEntityColumns.filter((item) => item !== column);
        } else {
          state.visibleEntityColumns = [...state.visibleEntityColumns, column];
        }
        localStorage.setItem(COLUMN_PREFS_KEY, JSON.stringify(state.visibleEntityColumns));
        syncColumnToggleButtons();
        renderEntitySections();
      }

      function getDirArticles() {
        return (state.historyData && state.historyData.articles) || state.data.articles || [];
      }

      function switchView(view) {
        state.activeView = view;
        const isDashboard = view === "dashboard";
        [
          document.querySelector(".controls-panel"),
          document.querySelector(".toggle-panel"),
          document.getElementById("entityContainer"),
          document.getElementById("bucketContainer"),
        ].forEach((el) => { if (el) el.style.display = isDashboard ? "" : "none"; });
        elements.entityDirectoryView.style.display = isDashboard ? "none" : "";
        elements.entitiesNavBtn.classList.toggle("active", !isDashboard);
        if (!isDashboard) renderEntityDirectory();
      }

      async function loadStocksData() {
        if (state.stocksLoading || state.stocksData !== null) return;
        state.stocksLoading = true;
        try {
          const res = await fetch("./data/stocks.json", { cache: "no-store" });
          if (res.ok) { const d = await res.json(); state.stocksData = d.stocks || {}; }
          else state.stocksData = {};
        } catch {
          state.stocksData = {};
        } finally {
          state.stocksLoading = false;
        }
      }

      function renderEntityDirectory() {
        const profiles = state.data.entityProfiles || {};
        const categories = state.data.entityCategories || {};
        const el = elements.entityDirContent;
        el.innerHTML = "";

        const catLabels = { suppliers: "Suppliers", clients: "Clients", competitors: "Competitors" };

        // Article counts per entity
        const articleCounts = new Map();
        getDirArticles().forEach((a) => {
          (a.entities || []).forEach((e) => articleCounts.set(e.name, (articleCounts.get(e.name) || 0) + 1));
        });

        // Search + sort bar
        const bar = document.createElement("div");
        bar.className = "entity-dir-bar";

        const searchInput = document.createElement("input");
        searchInput.type = "search";
        searchInput.placeholder = "Search entities…";
        searchInput.className = "entity-dir-search";

        let currentSort = "az";
        const sortAZ = document.createElement("button");
        sortAZ.type = "button";
        sortAZ.textContent = "A – Z";
        sortAZ.className = "entity-dir-sort-btn active";

        const sortCount = document.createElement("button");
        sortCount.type = "button";
        sortCount.textContent = "Most mentioned";
        sortCount.className = "entity-dir-sort-btn";

        bar.append(searchInput, sortAZ, sortCount);
        el.appendChild(bar);

        const grouped = { suppliers: [], clients: [], competitors: [] };
        Object.entries(profiles).forEach(([name, profile]) => {
          const cat = categories[name];
          if (cat && grouped[cat]) grouped[cat].push({ name, profile });
        });

        function buildGroups() {
          el.querySelectorAll(".entity-dir-group").forEach((g) => g.remove());

          const q = searchInput.value.trim().toLowerCase();

          Object.entries(grouped).forEach(([cat, items]) => {
            const filtered = items.filter(({ name }) => name.toLowerCase().includes(q));
            if (filtered.length === 0) return;

            const sorted = [...filtered].sort((a, b) =>
              currentSort === "az"
                ? a.name.localeCompare(b.name)
                : (articleCounts.get(b.name) || 0) - (articleCounts.get(a.name) || 0)
            );

            const group = document.createElement("div");
            group.className = "entity-dir-group";
            group.appendChild(createTextElement("div", catLabels[cat], "entity-dir-group-title"));

            const grid = document.createElement("div");
            grid.className = "entity-dir-grid";

            sorted.forEach(({ name, profile }) => {
              const card = document.createElement("div");
              card.className = "entity-card";
              card.appendChild(createTextElement("div", name, "entity-card-name"));

              const meta = document.createElement("div");
              meta.className = "entity-card-meta";
              meta.appendChild(createTextElement("span", catLabels[cat].slice(0, -1), `entity-card-badge ${cat}`));
              if (profile.stock && profile.stock.ticker) {
                meta.appendChild(createTextElement("span", profile.stock.ticker, "entity-card-stock"));
              }
              const cnt = articleCounts.get(name) || 0;
              if (cnt > 0) meta.appendChild(createTextElement("span", `${cnt} articles`, "entity-card-hq"));
              card.appendChild(meta);

              if (profile.hq) card.appendChild(createTextElement("div", profile.hq, "entity-card-hq"));
              if (profile.description) card.appendChild(createTextElement("div", profile.description, "entity-card-desc"));

              card.addEventListener("click", () => openEntityOverlay(name));
              grid.appendChild(card);
            });

            group.appendChild(grid);
            el.appendChild(group);
          });

          if (el.querySelectorAll(".entity-dir-group").length === 0) {
            const empty = createTextElement("div", "No entities match your search.", "overlay-empty");
            empty.className += " entity-dir-empty";
            el.appendChild(empty);
          } else {
            el.querySelector(".entity-dir-empty")?.remove();
          }
        }

        searchInput.addEventListener("input", buildGroups);
        sortAZ.addEventListener("click", () => {
          currentSort = "az";
          sortAZ.classList.add("active");
          sortCount.classList.remove("active");
          buildGroups();
        });
        sortCount.addEventListener("click", () => {
          currentSort = "count";
          sortCount.classList.add("active");
          sortAZ.classList.remove("active");
          buildGroups();
        });

        buildGroups();
      }

      function openEntityOverlay(name) {
        state.openEntityName = name;
        state.overlayTab = "profile";

        elements.overlayEntityName.textContent = name;
        const cat = (state.data.entityCategories || {})[name];
        const catLabels = { suppliers: "Supplier", clients: "Client", competitors: "Competitor" };
        elements.overlayEntityBadge.innerHTML = "";
        if (cat) {
          elements.overlayEntityBadge.appendChild(
            createTextElement("span", catLabels[cat] || cat, `entity-card-badge ${cat}`)
          );
        }

        renderOverlayNav(name);
        renderOverlayContent(name);

        elements.entityOverlayBackdrop.classList.add("visible");
        elements.entityOverlay.classList.add("open");
        document.body.style.overflow = "hidden";

        const profile = (state.data.entityProfiles || {})[name] || {};
        if (profile.stock && profile.stock.ticker) {
          loadStocksData().then(() => {
            if (state.openEntityName === name && state.overlayTab === "profile") renderOverlayContent(name);
          });
        }
      }

      function closeEntityOverlay() {
        state.openEntityName = null;
        elements.entityOverlayBackdrop.classList.remove("visible");
        elements.entityOverlay.classList.remove("open");
        document.body.style.overflow = "";
      }

      function renderOverlayNav(name) {
        const count = getDirArticles().filter((a) =>
          (a.entities || []).some((e) => e.name === name)
        ).length;

        elements.overlayNav.innerHTML = "";
        [{ key: "profile", label: "Profile" }, { key: "news", label: `News (${count})` }, { key: "events", label: "Events" }].forEach(({ key, label }) => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "overlay-nav-tab" + (state.overlayTab === key ? " active" : "");
          btn.textContent = label;
          btn.addEventListener("click", () => {
            state.overlayTab = key;
            renderOverlayNav(name);
            renderOverlayContent(name);
          });
          elements.overlayNav.appendChild(btn);
        });
      }

      function renderOverlayContent(name) {
        const body = elements.overlayBody;
        body.innerHTML = "";
        if (state.overlayTab === "profile") renderOverlayProfile(name, body);
        else if (state.overlayTab === "news") renderOverlayNews(name, body);
        else renderOverlayEvents(body);
      }

      function renderOverlayEvents(body) {
        const wrap = document.createElement("div");
        wrap.style.cssText = "padding:32px 0;text-align:center;";
        wrap.appendChild(createTextElement("div", "Events", "summary-label"));
        const msg = createTextElement("p", "Coming soon — this tab will show trade shows, port calls, and industry conferences for this entity.", "overlay-empty");
        msg.style.maxWidth = "360px";
        msg.style.margin = "12px auto 0";
        wrap.appendChild(msg);
        body.appendChild(wrap);
      }

      function renderOverlayProfile(name, body) {
        const profile = (state.data.entityProfiles || {})[name] || {};

        [
          { label: "Website", value: profile.website, link: true },
          { label: "LinkedIn", value: profile.linkedin, link: true, display: "LinkedIn →" },
          { label: "HQ", value: profile.hq },
          { label: "Founded", value: profile.founded ? String(profile.founded) : null },
        ].forEach(({ label, value, link, display }) => {
          if (!value) return;
          const row = document.createElement("div");
          row.className = "overlay-profile-row";
          row.appendChild(createTextElement("span", label, "overlay-profile-label"));
          const val = document.createElement("span");
          val.className = "overlay-profile-value";
          if (link) {
            const a = document.createElement("a");
            a.href = value;
            a.target = "_blank";
            a.rel = "noreferrer noopener";
            a.textContent = display || value.replace(/^https?:\/\/(www\.)?/, "").replace(/\/$/, "");
            val.appendChild(a);
          } else {
            val.textContent = value;
          }
          row.appendChild(val);
          body.appendChild(row);
        });

        if (profile.description) {
          body.appendChild(createTextElement("p", profile.description, "overlay-desc"));
        }

        const stock = profile.stock;
        if (stock && stock.ticker) {
          const widget = document.createElement("div");
          widget.className = "stock-widget";
          widget.appendChild(createTextElement("div",
            `${stock.ticker}${stock.exchange ? " · " + stock.exchange : ""}`,
            "stock-widget-ticker"
          ));
          const info = state.stocksData && state.stocksData[name];
          if (info && info.price != null) {
            widget.appendChild(createTextElement("div",
              `${info.currency || ""} ${info.price.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`,
              "stock-widget-price"
            ));
            const sign = (info.changePct || 0) > 0 ? "+" : "";
            const cls = (info.changePct || 0) > 0 ? "up" : (info.changePct || 0) < 0 ? "down" : "flat";
            widget.appendChild(createTextElement("div",
              `${sign}${(info.change || 0).toFixed(2)} (${sign}${(info.changePct || 0).toFixed(2)}%)`,
              `stock-widget-change ${cls}`
            ));
            widget.appendChild(createTextElement("div", `Updated ${formatDate(info.updatedAt)}`, "stock-widget-updated"));
          } else if (state.stocksData === null) {
            widget.appendChild(createTextElement("div", "Loading…", "stock-widget-updated"));
          } else {
            widget.appendChild(createTextElement("div", "No price data available", "stock-widget-updated"));
          }
          if (stock.note) widget.appendChild(createTextElement("div", stock.note, "stock-widget-updated"));
          body.appendChild(widget);
        }

        if (!profile.website && !profile.hq && !profile.description && !stock) {
          body.appendChild(createTextElement("div", "No profile information available.", "overlay-empty"));
        }
      }

      function renderOverlayNews(name, body) {
        const articles = getDirArticles()
          .filter((a) => (a.entities || []).some((e) => e.name === name))
          .sort((a, b) => {
            const bd = (PRIORITY_LEVELS[b.priorityBand] ?? 0) - (PRIORITY_LEVELS[a.priorityBand] ?? 0);
            if (bd !== 0) return bd;
            return new Date(b.publishedAt || 0) - new Date(a.publishedAt || 0);
          });

        if (articles.length === 0) {
          body.appendChild(createTextElement("div", "No articles found for this entity.", "overlay-empty"));
          return;
        }
        articles.slice(0, 50).forEach((article) => body.appendChild(createArticleRow(article)));
      }

      async function boot() {
        syncDataToUi();
        if (window.location.protocol !== "file:") {
          try {
            await loadApiData();
            setRefreshStatus("Ready");
          } catch {
            setRefreshStatus("Auto-refreshed every 30 min via GitHub Actions");
          }
        } else {
          setRefreshStatus("File mode: refresh button needs local_server.py");
        }

        const bindFilterControl = (element) => {
          element.addEventListener("input", render);
          element.addEventListener("change", render);
        };

        [
          elements.sourceFilter,
          elements.topicFilter,
          elements.highPriorityOnly,
          elements.entityFilter,
          elements.searchInput,
          elements.paywalledOnly
        ].forEach(bindFilterControl);

        elements.departmentFilter.addEventListener("change", () => {
          state.activeDepartment = elements.departmentFilter.value || "all";
          localStorage.setItem(DEPARTMENT_KEY, state.activeDepartment);
          render();
        });
        elements.clearFiltersButton.addEventListener("click", clearFilters);
        elements.refreshButton.addEventListener("click", refreshFeeds);

        elements.entitiesNavBtn.addEventListener("click", () => {
          switchView(state.activeView === "entities" ? "dashboard" : "entities");
        });
        elements.entityOverlayClose.addEventListener("click", closeEntityOverlay);
        elements.entityOverlayBackdrop.addEventListener("click", closeEntityOverlay);
        document.addEventListener("keydown", (e) => { if (e.key === "Escape" && state.openEntityName) closeEntityOverlay(); });

        elements.toggleButtons.forEach((button) => {
          button.addEventListener("click", () => {
            state.activeAudience = button.dataset.audience;
            render();
          });
        });

        elements.columnToggleButtons.forEach((btn) => {
          btn.addEventListener("click", () => {
            toggleEntityColumn(btn.dataset.column);
          });
        });
        syncColumnToggleButtons();

        render();
      }

      if (localStorage.getItem(AUTH_KEY) === PASSWORD_HASH) {
        boot();
      }
    </script>
  </body>
</html>
