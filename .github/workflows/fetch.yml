name: Fetch Maritime News

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Fetch RSS feeds
        run: python3 scripts/fetch_feeds.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/articles.json data/articles.js
          git diff --staged --quiet || git commit -m "auto: refresh articles $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
