name: Fetch Maritime News

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: pip install yfinance

      - name: Fetch feeds, watched pages, and stock quotes
        run: python3 scripts/fetch_feeds.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/articles.json data/articles.js data/articles-history.json data/source-state.json data/stocks.json
          git diff --staged --quiet || git commit -m "auto: refresh articles $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
